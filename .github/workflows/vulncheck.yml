name: Vulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Advisories get published against code that hasn't changed, so a
    # scan that only runs on push will never see them. The x/image webp
    # panics sat in a pinned dependency with no commit to trigger on.
    # Offset from the hour: scheduled jobs at :00 queue behind everyone
    # else's.
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        # Same version the release build uses, so the standard library
        # findings reflect what actually ships rather than whatever
        # toolchain happens to be newest.
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      # Reports only vulnerabilities this code can actually reach, which
      # is the part Dependabot's version matching misses in both
      # directions: it flagged a TIFF CVE nothing here imports, while the
      # reachable webp panics in the same module went unreported.
      - name: govulncheck
        run: govulncheck ./...
